<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호구 탈출 AI - 제미나이 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 flex flex-col items-center font-sans">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-6 mt-10 border-t-8 border-red-600">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">🛡️ 호구 탈출 AI</h1>
        <p class="text-center text-gray-500 mb-6 text-sm italic">"부장님, 죄송하지만 그건 제 알바가 아닙니다."</p>

        <label class="block text-gray-700 font-bold mb-2">상사의 빡치는 멘트 입력:</label>
        <textarea id="bossMessage" rows="4" class="w-full border rounded-lg p-3 text-gray-700 focus:ring-2 focus:ring-red-500 mb-4" placeholder="예: 오늘 저녁에 삼겹살 번개 어때?"></textarea>

        <button onclick="askGemini()" id="btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-4 rounded-lg shadow-md transition duration-200">
            실시간 방어 멘트 생성 (Gemini)
        </button>

        <div id="loading" class="mt-6 text-center hidden">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-red-600"></div>
            <p class="text-gray-500 mt-2">제미나이가 반격 준비 중... 🥊</p>
        </div>

        <div id="resultArea" class="mt-8 hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <span class="mr-2">💡</span> AI 추천 반격 카드
            </h2>
            <div id="replyBox" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        // 🚨 중요: 여기에 방금 복사하신 API 키를 따옴표 안에 넣으세요!
        const API_KEY = "AIzaSyBNKJKju7y8RfnYynkyh4dbuZ_pD-sXvN8"; 

        async function askGemini() {
            const msg = document.getElementById('bossMessage').value;
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const replyBox = document.getElementById('replyBox');

            if (!msg) return alert("부장님의 헛소리를 먼저 적어주십쇼!");

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const prompt = `너는 10년차 직장인 처세술 전문가야. 다음 상사의 말에 대해 [유머형], [철벽 방어형], [은은한 광기형] 3가지 답변을 만들어줘. 말투는 극도로 정중한 '비즈니스 톤'이어야 하지만 내용은 확실하게 거절하거나 방어해야 해. 결과는 반드시 HTML 태그 없이 텍스트로만 해줘. 상사의 말: "${msg}"`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const resultText = data.candidates[0].content.parts[0].text;

                // 결과 가공해서 보여주기
                replyBox.innerHTML = resultText.split('\n').filter(line => line.trim() !== "").map(line => 
                    `<div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-gray-700 shadow-sm leading-relaxed">${line}</div>`
                ).join('');

                resultArea.classList.remove('hidden');
            } catch (error) {
                alert("앗! 연결 실패. 키가 맞는지 확인해 보십쇼!");
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
