<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호구 탈출 AI - 진짜 2026년 버전</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🙅</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 flex flex-col items-center font-sans text-gray-800">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-6 mt-10 border-t-8 border-red-600">
        <h1 class="text-3xl font-bold text-center mb-2 italic text-red-600">🛡️ 호구 탈출 AI</h1>
        <p class="text-center text-gray-500 mb-6 text-sm">"상사의 무리한 요구, 이제 AI가 받아쳐 드립니다."</p>

        <label class="block font-bold mb-2">상사의 카톡/멘트 입력:</label>
        <textarea id="bossMessage" rows="4" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-red-500 mb-4 outline-none" placeholder="예: 오늘 저녁에 삼겹살 번개 어때?"></textarea>

        <button onclick="askGemini()" id="btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-4 rounded-lg shadow-md transition duration-200 text-lg">
            방어 멘트 생성하기 (Gemini)
        </button>

        <div id="loading" class="mt-6 text-center hidden">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-red-600"></div>
            <p class="text-gray-500 mt-2 font-bold">AI가 사이다 멘트 장전 중... 🥊</p>
        </div>

        <div id="resultArea" class="mt-8 hidden">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="mr-2 text-xl">💡</span> AI의 사이다 답변 카드
            </h2>
            <div id="replyBox" class="space-y-4 text-sm"></div>
        </div>
    </div>

    <script>
        // 🚨 형님!! 절대 제 가짜 키 쓰지 마시고, 형님이 아까 발급받은 '진짜 키'를 여기에 꼭 넣어주십쇼!!
        const API_KEY = "AIzaSyC2fw0o9M-U5pb10E57hb4LfIH0JCOKIrM";

        async function askGemini() {
            const msg = document.getElementById('bossMessage').value;
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const replyBox = document.getElementById('replyBox');

            if (!msg) return alert("부장님의 헛소리를 먼저 적어주십쇼!");

            btn.disabled = true;
            btn.innerText = "처리 중...";
            loading.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const prompt = `너는 대한민국 최고의 직장인 처세술 전문가야. 상사의 무리한 요구나 질문에 대해 [유머형], [철벽 방어형], [은은한 광기형] 3가지 답변을 만들어줘. 말투는 정중한 '비즈니스 톤'이어야 하지만 확실하게 거절해야 해. 상사의 말: "${msg}"`;

            try {
                // 🚨 핵심 수정: 2026년 현재 가장 쌩쌩하게 돌아가는 'gemini-2.5-flash' 모델로 갈아끼웠습니다!
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const resultText = data.candidates[0].content.parts[0].text;

                replyBox.innerHTML = resultText.split('\n').filter(l => l.trim() !== "").map(l => 
                    `<div class="bg-gray-50 p-4 rounded-lg border border-gray-200 shadow-sm leading-relaxed">${l}</div>`
                ).join('');

                resultArea.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("🚨 에러: " + error.message);
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.innerText = "방어 멘트 생성하기 (Gemini)";
            }
        }
    </script>
</body>
</html>
