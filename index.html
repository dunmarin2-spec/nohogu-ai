<script>
    const API_KEY = "AIzaSyBNKJKju7y8RfnYynkyh4dbuZ_pD-sXvN8"; 

    async function askGemini() {
        const msg = document.getElementById('bossMessage').value;
        const btn = document.getElementById('btn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');
        const replyBox = document.getElementById('replyBox');

        if (!msg) return alert("부장님의 헛소리를 먼저 적어주십쇼!");

        btn.disabled = true;
        loading.classList.remove('hidden');
        resultArea.classList.add('hidden');

        const prompt = `너는 10년차 직장인 처세술 전문가야. 다음 상사의 말에 대해 [유머형], [철벽 방어형], [은은한 광기형] 3가지 답변을 만들어줘. 말투는 정중한 비즈니스 톤이어야 하지만 확실하게 방어해야 해. 상사의 말: "${msg}"`;

        try {
            // 🚨 수정 포인트: 모델 이름을 gemini-3-flash로 변경했습니다!
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const resultText = data.candidates[0].content.parts[0].text;

            replyBox.innerHTML = resultText.split('\n').filter(line => line.trim() !== "").map(line => 
                `<div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-gray-700 shadow-sm leading-relaxed">${line}</div>`
            ).join('');

            resultArea.classList.remove('hidden');
        } catch (error) {
            console.error(error);
            alert("에러 발생: " + error.message);
        } finally {
            loading.classList.add('hidden');
            btn.disabled = false;
        }
    }
</script>
